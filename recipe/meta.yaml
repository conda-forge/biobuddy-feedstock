{% set name = "biobuddy" %}
{% set version = "0.3.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 101268d73298fb5cc05219c7c8bbdb86c741b53d03ce5a294b5d0b37e73a477d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
    - hatchling
    - wheel
  run:
    - python >={{ python_min }}
    - numpy
    - ezc3d
    - lxml
    - scipy
    - pandas
    - graphviz
test:
  imports:
    - biobuddy
  requires:
    - python {{ python_min }}

about:
  home: https://github.com/pyomeca/biobuddy
  summary: 'A generic interface to generate a virtual buddy'
  description: |
    A generic interface to generate a virtual buddy
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: https://github.com/pyomeca/biobuddy

extra:
  recipe-maintainers:
    - EveCharbie
